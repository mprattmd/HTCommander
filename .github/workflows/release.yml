name: Release packages

# On a version tag push (e.g. v0.4.3), build the Linux AppImage and the macOS .app
# and attach them to that tag's GitHub release — so cutting a release no longer needs
# a manual build on a Linux/Mac box. Create the release (with notes) first, or let this
# workflow create a bare one.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)attach packages to'
        required: true

permissions:
  contents: write

jobs:
  linux-appimage:
    name: Linux AppImage
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install appimagetool
        run: |
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'   # run appimagetool without FUSE (not on the runner)
        run: |
          ./packaging/build-appimage.sh
          mv packaging/HTCommander-linux-x64.AppImage HTCommander-x86_64.AppImage
          ls -lh HTCommander-x86_64.AppImage

      - name: Attach to the release
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes || true
          gh release upload "$TAG" HTCommander-x86_64.AppImage --clobber --repo "$GITHUB_REPOSITORY"

  macos-app:
    name: macOS .app (Apple Silicon)
    runs-on: macos-latest          # macos-latest is Apple Silicon (arm64)
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # True only when the signing secrets exist; otherwise the build stays unsigned.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install PortAudio (bundled into the .app)
        run: brew install portaudio

      - name: Build .app
        run: ./mac/build-app.sh osx-arm64      # builds libhtbt (swiftc) + publishes + bundles

      # ---- Codesign + notarize (only when the Apple Developer ID secrets are set) ----
      - name: Import signing certificate
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p ci /tmp/build.keychain
          security default-keychain -s /tmp/build.keychain
          security unlock-keychain -p ci /tmp/build.keychain
          security set-keychain-settings -lut 3600 /tmp/build.keychain
          security import /tmp/cert.p12 -k /tmp/build.keychain -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci /tmp/build.keychain
          # Put the build keychain on codesign's search list — setting it as the *default*
          # is not enough; codesign only searches the list, so without this the identity
          # imports fine but `codesign --sign` fails with "no identity found".
          security list-keychains -d user -s /tmp/build.keychain login.keychain-db
          # Sanity-check the identity is actually visible before we rely on it.
          security find-identity -v -p codesigning /tmp/build.keychain
          rm -f /tmp/cert.p12

      - name: Codesign (hardened runtime, all nested Mach-O)
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          APP=dist/mac/HTCommander.app
          ENT=mac/HTCommander.entitlements
          EXE=HTCommander.UI.Avalonia
          # Derive the identity from the keychain by its SHA-1 hash rather than trusting the
          # MACOS_SIGN_IDENTITY string to match exactly — the cert imported fine but a name
          # mismatch (whitespace/typo) made `codesign --sign "<name>"` fail "no identity found".
          SIGN_ID=$(security find-identity -v -p codesigning /tmp/build.keychain \
            | awk '/Developer ID Application/ {print $2; exit}')
          [ -n "$SIGN_ID" ] || { echo "No Developer ID Application identity in the keychain"; exit 1; }
          echo "Signing with identity $SIGN_ID"
          # The .NET self-contained layout puts the whole payload in Contents/MacOS, and
          # codesign treats EVERY file there as code that must be signed — not just Mach-O.
          # Drop debug symbols first (they break sealing and shouldn't ship)…
          find "$APP" -name '*.pdb' -delete
          # …sign every nested file except the apphost (managed .dll, .json, dylibs, createdump)…
          find "$APP/Contents/MacOS" -type f ! -name "$EXE" -print0 \
            | xargs -0 codesign --force --options runtime --timestamp --entitlements "$ENT" --sign "$SIGN_ID"
          # …then the bundle itself (signs the apphost and seals the rest).
          codesign --force --options runtime --timestamp --entitlements "$ENT" --sign "$SIGN_ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize + staple
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          APPLE_PW: ${{ secrets.MACOS_NOTARY_PASSWORD }}   # app-specific password
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          ditto -c -k --keepParent dist/mac/HTCommander.app /tmp/notarize.zip
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PW" --team-id "$TEAM_ID" --wait
          xcrun stapler staple dist/mac/HTCommander.app
          xcrun stapler validate dist/mac/HTCommander.app

      - name: Zip the bundle
        run: ditto -c -k --keepParent dist/mac/HTCommander.app HTCommander-macos-arm64.zip

      - name: Attach to the release
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes || true
          gh release upload "$TAG" HTCommander-macos-arm64.zip --clobber --repo "$GITHUB_REPOSITORY"
